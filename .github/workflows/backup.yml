name: Supabase Backup

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client (v17)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /etc/apt/trusted.gpg.d/postgres.asc
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Create backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          mkdir -p backups
          FILE="backups/backup-$(date +%F).sql.gz"
          /usr/lib/postgresql/17/bin/pg_dump "${SUPABASE_DB_URL}?sslmode=require" | gzip > "${FILE}"
          test -s "${FILE}"
          echo "Created: ${FILE}"
          ls -lh backups

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_number }}
          path: backups/
          retention-days: 7
